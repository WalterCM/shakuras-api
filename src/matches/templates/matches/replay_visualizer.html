<!DOCTYPE html>
<html>

<head>
    <title>Replay Visualizer - Match {{ match.id }}</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: fit-content;
        }

        canvas {
            background: #020617;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            cursor: crosshair;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            min-width: 80px;
        }

        button:hover {
            background: #2563eb;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: #3b82f6;
        }

        select {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 0.4rem;
            border-radius: 0.375rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="stats">
            <span>Match #{{ match.id }}</span>
            <div id="resources" style="display: flex; gap: 1rem; font-weight: bold;">
                <span id="p1-minerals" style="color: #3b82f6">M: 50</span>
                <span id="p2-minerals" style="color: #ef4444">M: 50</span>
            </div>
            <span id="tick-display">Tick: 0 / 0</span>
        </div>
        <canvas id="replay-canvas" width="600" height="600"></canvas>
        <div class="controls">
            <button id="play-pause">Play</button>
            <input type="range" id="progress" min="0" max="0" value="0">
            <select id="speed">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="5">5x</option>
                <option value="10">10x</option>
            </select>
            <button id="reset">Reset</button>
        </div>
    </div>

    {{ match.replay.log|json_script:"replay_data" }}

    <script>
        const canvas = document.getElementById('replay-canvas');
        const ctx = canvas.getContext('2d');
        const replayData = JSON.parse(document.getElementById('replay_data').textContent);

        // Match State Constants
        const MAP_WIDTH = replayData[0].map?.width || 128;
        const MAP_HEIGHT = replayData[0].map?.height || 128;
        const SCALE = canvas.width / Math.max(MAP_WIDTH, MAP_HEIGHT);

        let currentTick = 0;
        let isPlaying = false;
        let playbackSpeed = 1;
        let lastFrameTime = performance.now();

        // Camera State
        const camera = {
            scale: 1,
            offsetX: 0,
            offsetY: 0,
            isDragging: false,
            lastX: 0,
            lastY: 0
        };

        // Reconstructed state for current frame
        let entitiesState = {};

        const playPauseBtn = document.getElementById('play-pause');
        const resetBtn = document.getElementById('reset');
        const progressCtrl = document.getElementById('progress');
        const speedCtrl = document.getElementById('speed');
        const tickDisplay = document.getElementById('tick-display');
        const p1Minerals = document.getElementById('p1-minerals');
        const p2Minerals = document.getElementById('p2-minerals');

        let playerResources = {};

        progressCtrl.max = replayData.length - 1;

        // Zoom Logic
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.1;
            const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
            const nextScale = Math.min(Math.max(camera.scale + delta, 0.5), 10);

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const worldX = (mouseX - camera.offsetX) / camera.scale;
            const worldY = (mouseY - camera.offsetY) / camera.scale;

            camera.scale = nextScale;
            camera.offsetX = mouseX - worldX * camera.scale;
            camera.offsetY = mouseY - worldY * camera.scale;

            draw();
        });

        // Panning Logic
        canvas.addEventListener('mousedown', (e) => {
            camera.isDragging = true;
            camera.lastX = e.clientX;
            camera.lastY = e.clientY;
        });
        window.addEventListener('mouseup', () => camera.isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!camera.isDragging) return;
            const dx = e.clientX - camera.lastX;
            const dy = e.clientY - camera.lastY;
            camera.offsetX += dx;
            camera.offsetY += dy;
            camera.lastX = e.clientX;
            camera.lastY = e.clientY;
            draw();
        });

        // Initialize state from Tick 0 (Full Snapshot)
        function initInitialState() {
            entitiesState = {};
            replayData[0].entities.forEach(ent => {
                entitiesState[ent.id] = { ...ent };
            });
            playerResources = { ...replayData[0].resources };
            updateResourceDisplay();
        }

        function updateResourceDisplay() {
            const ids = Object.keys(playerResources);
            if (ids.length >= 2) {
                p1Minerals.textContent = `M: ${Math.round(playerResources[ids[0]])}`;
                p2Minerals.textContent = `M: ${Math.round(playerResources[ids[1]])}`;
            }
        }

        function applyDelta(tickIndex) {
            const tickData = replayData[tickIndex];
            if (!tickData) return;

            if (tickIndex === 0) {
                initInitialState();
            } else {
                tickData.entities.forEach(delta => {
                    const ent = entitiesState[delta.id];
                    if (ent) {
                        if (delta.hp !== undefined && delta.hp < ent.hp) {
                            ent.lastFlashTick = tickIndex;
                        }
                        Object.assign(ent, delta);
                    } else {
                        // NEW ENTITY spawned in this tick
                        entitiesState[delta.id] = { ...delta };
                    }
                });
            }

            if (tickData.resources) {
                Object.assign(playerResources, tickData.resources);
                updateResourceDisplay();
            }
        }

        function jumpToTick(targetTick) {
            if (targetTick < currentTick) {
                initInitialState();
                for (let i = 0; i <= targetTick; i++) applyDelta(i);
            } else {
                for (let i = currentTick + 1; i <= targetTick; i++) applyDelta(i);
            }
            currentTick = targetTick;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.setTransform(camera.scale, 0, 0, camera.scale, camera.offsetX, camera.offsetY);

            // Draw grid
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1 / camera.scale;
            for (let i = 0; i <= MAP_WIDTH; i += 8) {
                ctx.beginPath();
                ctx.moveTo(i * SCALE, 0); ctx.lineTo(i * SCALE, MAP_HEIGHT * SCALE);
                ctx.stroke();
            }
            for (let i = 0; i <= MAP_HEIGHT; i += 8) {
                ctx.beginPath();
                ctx.moveTo(0, i * SCALE); ctx.lineTo(MAP_WIDTH * SCALE, i * SCALE);
                ctx.stroke();
            }

            tickDisplay.textContent = `Tick: ${currentTick} / ${replayData.length - 1}`;
            progressCtrl.value = currentTick;

            Object.values(entitiesState).forEach(entity => {
                if (entity.status === 'dead') return;

                const x = entity.x * SCALE;
                const y = entity.y * SCALE;
                const isFlashing = entity.lastFlashTick && (currentTick - entity.lastFlashTick < 3);

                ctx.beginPath();
                let radius = entity.radius ? entity.radius * SCALE : 6;

                if (entity.type === 'base') {
                    ctx.roundRect(x - 15, y - 15, 30, 30, 5);
                } else if (entity.type === 'mineral_patch') {
                    ctx.roundRect(x - 10, y - 10, 20, 20, 3);
                } else {
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                }

                let baseColor = entity.owner_id === 'p1' ? '#3b82f6' : '#ef4444';
                if (entity.owner_id === 'neutral') baseColor = '#eab308';

                if (entity.type === 'marine') {
                    ctx.fillStyle = entity.owner_id === 'p1' ? '#00f2ff' : '#ff0055';
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2 / camera.scale;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = 10 * camera.scale;
                } else if (entity.type === 'worker') {
                    ctx.fillStyle = baseColor;
                    ctx.strokeStyle = entity.carrying > 0 ? '#fbbf24' : 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = (entity.carrying > 0 ? 3 : 1) / camera.scale;
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = baseColor;
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 1 / camera.scale;
                    ctx.shadowBlur = 0;
                }

                if (isFlashing) ctx.fillStyle = '#ffffff';

                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.closePath();

                const maxHp = entity.type === 'base' ? 1500 : (entity.type === 'mineral_patch' ? 1500 : 40);
                const hpPercent = entity.hp / maxHp;

                if (hpPercent < 1.0 || entity.type !== 'mineral_patch') {
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(x - 10, y - radius - 8, 20, 4);
                    const barColor = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.2 ? '#eab308' : '#ef4444');
                    ctx.fillStyle = barColor;
                    ctx.fillRect(x - 10, y - radius - 8, 20 * hpPercent, 4);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `${10 / camera.scale}px Inter`;
                ctx.textAlign = 'center';

                if (entity.type === 'base') {
                    ctx.fillText(entity.hp.toFixed(0), x, y + 25);
                    if (entity.prod_queue && entity.prod_queue.length > 0) {
                        const unitName = entity.prod_queue[0].toUpperCase();
                        const maxProd = unitName === 'MARINE' ? 24 : (unitName === 'WORKER' ? 20 : 120);
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(x - 12, y + 28, 24, 4);
                        ctx.fillStyle = '#3b82f6';
                        ctx.fillRect(x - 12, y + 28, 24 * (entity.prod_progress / maxProd), 4);
                        ctx.fillStyle = 'white';
                        ctx.font = `bold ${9 / camera.scale}px Inter, sans-serif`;
                        ctx.fillText(`${unitName} (${entity.prod_queue.length})`, x, y + 42);
                    }
                } else if (entity.type === 'mineral_patch') {
                    ctx.fillText(entity.hp.toFixed(0), x, y + 20);
                } else {
                    // Small label for units
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${8 / camera.scale}px Inter`;
                    ctx.fillText(entity.type[0].toUpperCase(), x, y + 3);
                }
            });
            ctx.restore();
        }

        function animate(timestamp) {
            if (isPlaying) {
                const elapsed = timestamp - lastFrameTime;
                const nextFrameDelay = 100 / playbackSpeed;
                if (elapsed > nextFrameDelay) {
                    if (currentTick < replayData.length - 1) {
                        currentTick++;
                        applyDelta(currentTick);
                        draw();
                    } else {
                        isPlaying = false;
                        playPauseBtn.textContent = 'Play';
                    }
                    lastFrameTime = timestamp;
                }
            }
            requestAnimationFrame(animate);
        }

        playPauseBtn.onclick = () => {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
            if (isPlaying && currentTick >= replayData.length - 1) {
                currentTick = 0;
                initInitialState();
            }
            lastFrameTime = performance.now();
        };

        resetBtn.onclick = () => {
            currentTick = 0;
            isPlaying = false;
            playPauseBtn.textContent = 'Play';
            initInitialState();
            draw();
        };

        progressCtrl.oninput = () => jumpToTick(parseInt(progressCtrl.value));
        speedCtrl.onchange = () => playbackSpeed = parseFloat(speedCtrl.value);

        initInitialState();
        draw();
        requestAnimationFrame(animate);
    </script>
</body>

</html>
