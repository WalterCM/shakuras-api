<!DOCTYPE html>
<html>

<head>
    <title>Scenario Visualizer</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: fit-content;
            display: flex;
            gap: 2rem;
        }

        .main-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .source-select {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        select, input[type="file"] {
            background: #334155;
            color: white;
            border: 1px solid #475569;
            padding: 0.4rem;
            border-radius: 0.375rem;
        }

        input[type="file"] {
            max-width: 200px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            min-width: 80px;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        #delta-log {
            width: 250px;
            background: #020617;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.75rem;
            overflow-y: auto;
            max-height: 600px;
            color: #94a3b8;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1e293b;
        }

        .log-tick {
            color: #3b82f6;
            font-weight: bold;
        }

        .log-status {
            color: #fbbf24;
        }

        .log-val {
            color: #f8fafc;
        }

        canvas {
            background: #020617;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            cursor: crosshair;
            display: none;
        }

        canvas.visible {
            display: block;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #3b82f6;
        }

        .scenario-info {
            background: #334155;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            max-width: 600px;
        }

        .scenario-info h3 {
            margin: 0 0 0.5rem 0;
            color: #3b82f6;
        }

        .scenario-info p {
            margin: 0;
            color: #94a3b8;
        }

        .loading {
            color: #fbbf24;
            font-style: italic;
        }

        .error {
            color: #ef4444;
            background: #7f1d1d;
            padding: 0.5rem;
            border-radius: 0.375rem;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="controls-bar">
        <div class="source-select">
            <label>Source:</label>
            <select id="sourceType">
                <option value="file">Upload YAML</option>
                <option value="preset">Preset Scenario</option>
            </select>
        </div>
        
        <div id="fileInput">
            <input type="file" id="yamlFile" accept=".yaml,.yml">
        </div>
        
        <div id="presetSelect" style="display: none;">
            <select id="scenarioSelect">
                <option value="">Select a scenario...</option>
                {% for scenario in scenarios %}
                <option value="{{ scenario.path }}">{{ scenario.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button id="runBtn">Run</button>
    </div>

    <div id="scenarioInfo" class="scenario-info" style="display: none;">
        <h3 id="scenarioName"></h3>
        <p id="scenarioDesc"></p>
    </div>

    <div id="errorMsg" class="error" style="display: none;"></div>
    <div id="loadingMsg" class="loading" style="display: none;">Running scenario...</div>

    <div class="container">
        <div class="main-ui">
            <div class="stats">
                <span>Scenario</span>
                <div id="resources" style="display: flex; gap: 1rem; font-weight: bold;">
                    <span id="p1-minerals" style="color: #3b82f6">M: 0</span>
                    <span id="p2-minerals" style="color: #ef4444">M: 0</span>
                </div>
                <span id="tick-display">Tick: 0 / 0</span>
            </div>
            <canvas id="replay-canvas" width="600" height="600"></canvas>
            <div class="controls">
                <button id="play-pause" disabled>Play</button>
                <input type="range" id="progress" min="0" max="0" value="0" disabled>
                <select id="speed">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="5">5x</option>
                    <option value="10">10x</option>
                </select>
                <button id="reset" disabled>Reset</button>
            </div>
        </div>
        <div id="delta-log">
            <div id="log-header"
                style="font-weight: bold; color: #f8fafc; margin-bottom: 1rem; border-bottom: 2px solid #3b82f6;">
                SELECT ENTITY</div>
            <div id="log-content">
                <div style="color: #64748b; font-style: italic;">Run a scenario and click a unit to view its logs.</div>
            </div>
        </div>
    </div>

    {{ scenarios|json_script:"scenarios_data" }}
    {{ unit_definitions|json_script:"unit_definitions" }}

    <script>
        const canvas = document.getElementById('replay-canvas');
        const ctx = canvas.getContext('2d');
        const scenariosData = JSON.parse(document.getElementById('scenarios_data').textContent);
        const UNIT_DEFS = JSON.parse(document.getElementById('unit_definitions').textContent);

        let replayData = null;
        
        // Match State Constants
        const MAP_WIDTH = 128;
        const MAP_HEIGHT = 128;
        const SCALE = canvas.width / Math.max(MAP_WIDTH, MAP_HEIGHT);

        let currentTick = 0;
        let isPlaying = false;
        let playbackSpeed = 1;
        let lastFrameTime = performance.now();

        // Camera State
        const camera = {
            scale: 1,
            offsetX: 0,
            offsetY: 0,
            isDragging: false,
            lastX: 0,
            lastY: 0
        };

        // Reconstructed state for current frame
        let entitiesState = {};

        const sourceType = document.getElementById('sourceType');
        const fileInput = document.getElementById('fileInput');
        const presetSelect = document.getElementById('presetSelect');
        const scenarioSelect = document.getElementById('scenarioSelect');
        const runBtn = document.getElementById('runBtn');
        const playPauseBtn = document.getElementById('play-pause');
        const resetBtn = document.getElementById('reset');
        const progressCtrl = document.getElementById('progress');
        const speedCtrl = document.getElementById('speed');
        const tickDisplay = document.getElementById('tick-display');
        const p1Minerals = document.getElementById('p1-minerals');
        const p2Minerals = document.getElementById('p2-minerals');
        const logContent = document.getElementById('log-content');
        const logHeader = document.getElementById('log-header');
        const scenarioInfo = document.getElementById('scenarioInfo');
        const scenarioName = document.getElementById('scenarioName');
        const scenarioDesc = document.getElementById('scenarioDesc');
        const errorMsg = document.getElementById('errorMsg');
        const loadingMsg = document.getElementById('loadingMsg');

        let playerResources = {};
        let monitoredEntityId = null;
        let nextDeltaIndex = 0;
        let MAX_TICKS = 0;

        // Source type toggle
        sourceType.addEventListener('change', () => {
            if (sourceType.value === 'file') {
                fileInput.style.display = 'block';
                presetSelect.style.display = 'none';
            } else {
                fileInput.style.display = 'none';
                presetSelect.style.display = 'block';
            }
        });

        // Run button
        runBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            loadingMsg.style.display = 'block';
            
            try {
                let response;
                
                if (sourceType.value === 'file') {
                    const yamlFile = document.getElementById('yamlFile').files[0];
                    if (!yamlFile) {
                        throw new Error('Please select a YAML file');
                    }
                    
                    const formData = new FormData();
                    formData.append('file', yamlFile);
                    
                    response = await fetch('/matches/scenarios/upload/', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    const scenarioPath = scenarioSelect.value;
                    if (!scenarioPath) {
                        throw new Error('Please select a scenario');
                    }
                    
                    response = await fetch('/matches/scenarios/run/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ path: scenarioPath })
                    });
                }
                
                const result = await response.json();
                
                if (result.status !== 'ok') {
                    throw new Error(result.message);
                }
                
                replayData = result.replay;
                
                // Find scenario name for display
                let name = 'Custom Scenario';
                let desc = '';
                if (sourceType.value === 'preset') {
                    const selected = scenariosData.find(s => s.path === scenarioSelect.value);
                    if (selected) {
                        name = selected.name;
                        desc = selected.description;
                    }
                }
                
                scenarioName.textContent = name;
                scenarioDesc.textContent = desc;
                scenarioInfo.style.display = 'block';
                
                // Initialize visualizer
                initVisualizer();
                
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                loadingMsg.style.display = 'none';
            }
        });

        function initVisualizer() {
            canvas.classList.add('visible');
            playPauseBtn.disabled = false;
            resetBtn.disabled = false;
            progressCtrl.disabled = false;
            
            MAX_TICKS = (replayData && replayData.length > 0) ? replayData[replayData.length - 1].tick : 0;
            progressCtrl.max = MAX_TICKS;
            
            initInitialState();
            draw();
        }

        // Zoom Logic
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.1;
            const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
            const nextScale = Math.min(Math.max(camera.scale + delta, 0.5), 10);

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const worldX = (mouseX - camera.offsetX) / camera.scale;
            const worldY = (mouseY - camera.offsetY) / camera.scale;

            camera.scale = nextScale;
            camera.offsetX = mouseX - worldX * camera.scale;
            camera.offsetY = mouseY - worldY * camera.scale;

            draw();
        });

        // Panning Logic (Middle Mouse Button)
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1) {
                e.preventDefault();
                camera.isDragging = true;
                camera.lastX = e.clientX;
                camera.lastY = e.clientY;
                canvas.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 1) {
                camera.isDragging = false;
                canvas.style.cursor = 'crosshair';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!camera.isDragging) return;
            const dx = e.clientX - camera.lastX;
            const dy = e.clientY - camera.lastY;
            camera.offsetX += dx;
            camera.offsetY += dy;
            camera.lastX = e.clientX;
            camera.lastY = e.clientY;
            draw();
        });

        // Selection Logic (Left Click)
        canvas.addEventListener('click', (e) => {
            if (e.button !== 0 || !replayData) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const worldX = (mouseX - camera.offsetX) / (camera.scale * SCALE);
            const worldY = (mouseY - camera.offsetY) / (camera.scale * SCALE);

            let closest = null;
            let minDist = 10;

            Object.values(entitiesState).forEach(ent => {
                if (ent.status === 'dead') return;
                const w = ent.width || 1;
                const h = ent.height || 1;
                
                const isInside = worldX >= ent.x - w/2 && worldX <= ent.x + w/2 &&
                                 worldY >= ent.y - h/2 && worldY <= ent.y + h/2;

                if (isInside) {
                    closest = ent;
                }
            });

            if (closest) {
                monitoredEntityId = closest.id;
                logHeader.innerHTML = `${closest.type.toUpperCase()} <span style="color: ${closest.owner_id === 'p1' ? '#3b82f6' : '#ef4444'}">${closest.owner_id.toUpperCase()}</span> [${closest.id.slice(0, 4)}]`;
                logContent.innerHTML = '';
                addLogEntry(currentTick, `Selected ${closest.type} (${closest.id.slice(0, 8)})`);
                draw();
            }
        });

        function initInitialState() {
            entitiesState = {};
            nextDeltaIndex = 0;
            currentTick = 0;

            if (replayData && replayData.length > 0) {
                replayData[0].entities.forEach(ent => {
                    entitiesState[ent.id] = { ...ent };
                });
                playerResources = { ...replayData[0].resources };
                nextDeltaIndex = 1;
            }
            updateResourceDisplay();
        }

        function addLogEntry(tick, message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-tick">[Tick ${tick}]</span> ${message}`;
            logContent.prepend(entry);
        }

        function updateResourceDisplay() {
            const ids = Object.keys(playerResources);
            if (ids.length >= 2) {
                p1Minerals.textContent = `M: ${Math.round(playerResources[ids[0]])}`;
                p2Minerals.textContent = `M: ${Math.round(playerResources[ids[1]])}`;
            }
        }

        function applyDelta(tickData) {
            if (!tickData) return;
            const tickIndex = tickData.tick;

            tickData.entities.forEach(delta => {
                const ent = entitiesState[delta.id];
                if (ent) {
                    if (delta.id === monitoredEntityId) {
                        if (delta.status !== undefined && delta.status !== ent.status) {
                            addLogEntry(tickIndex, `status: <span class="log-status">${ent.status}</span> → <span class="log-status">${delta.status}</span>`);
                        }
                        if (delta.carrying !== undefined && delta.carrying !== ent.carrying) {
                            addLogEntry(tickIndex, `carrying: <span class="log-val">${ent.carrying}</span> → <span class="log-val">${delta.carrying}</span>`);
                        }
                        if (delta.hp !== undefined && delta.hp !== ent.hp) {
                            const diff = delta.hp - ent.hp;
                            const color = diff < 0 ? '#ef4444' : '#22c55e';
                            addLogEntry(tickIndex, `hp: <span class="log-val">${ent.hp}</span> → <span class="log-val" style="color: ${color}">${delta.hp}</span>`);
                        }
                    }

                    if (delta.hp !== undefined && delta.hp < ent.hp) {
                        ent.lastFlashTick = tickIndex;
                    }
                    Object.assign(ent, delta);
                } else {
                    entitiesState[delta.id] = { ...delta };
                }
            });

            if (tickData.resources) {
                Object.assign(playerResources, tickData.resources);
                updateResourceDisplay();
            }
        }

        function jumpToTick(targetTick) {
            initInitialState();
            nextDeltaIndex = 0;
            currentTick = 0;

            while (nextDeltaIndex < replayData.length && replayData[nextDeltaIndex].tick <= targetTick) {
                currentTick = replayData[nextDeltaIndex].tick;
                applyDelta(replayData[nextDeltaIndex]);
                nextDeltaIndex++;
            }
            currentTick = targetTick;
            draw();
        }

        function draw() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.setTransform(camera.scale, 0, 0, camera.scale, camera.offsetX, camera.offsetY);

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, MAP_WIDTH * SCALE, MAP_HEIGHT * SCALE);

            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1 / camera.scale;
            for (let i = 0; i <= MAP_WIDTH; i += 8) {
                ctx.beginPath();
                ctx.moveTo(i * SCALE, 0); ctx.lineTo(i * SCALE, MAP_HEIGHT * SCALE);
                ctx.stroke();
            }
            for (let i = 0; i <= MAP_HEIGHT; i += 8) {
                ctx.beginPath();
                ctx.moveTo(0, i * SCALE); ctx.lineTo(MAP_WIDTH * SCALE, i * SCALE);
                ctx.stroke();
            }

            tickDisplay.textContent = `Tick: ${currentTick} / ${MAX_TICKS}`;
            progressCtrl.value = currentTick;

            Object.values(entitiesState).forEach(entity => {
                if (entity.status === 'dead') return;

                const x = entity.x * SCALE;
                const y = entity.y * SCALE;
                const isFlashing = entity.lastFlashTick && (currentTick - entity.lastFlashTick < 3);

                ctx.beginPath();
                let width = (entity.width || 1) * SCALE;
                let height = (entity.height || 1) * SCALE;
                let radius = entity.radius ? entity.radius * SCALE : 6;

                // Render everything as rectangles now that we have width/height
                ctx.roundRect(x - width / 2, y - height / 2, width, height, 2);

                let baseColor = entity.owner_id === 'p1' ? '#3b82f6' : '#ef4444';
                if (entity.owner_id === 'neutral') baseColor = '#eab308';

                if (entity.type === 'marine') {
                    ctx.fillStyle = entity.owner_id === 'p1' ? '#00f2ff' : '#ff0055';
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2 / camera.scale;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = 10 * camera.scale;
                } else if (entity.type === 'worker') {
                    ctx.fillStyle = baseColor;
                    ctx.strokeStyle = entity.carrying > 0 ? '#fbbf24' : 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = (entity.carrying > 0 ? 3 : 1) / camera.scale;
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = baseColor;
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    ctx.lineWidth = 1 / camera.scale;
                    ctx.shadowBlur = 0;
                }

                if (isFlashing) ctx.fillStyle = '#ffffff';

                ctx.fill();
                ctx.stroke();

                if (entity.id === monitoredEntityId) {
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2 / camera.scale;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.shadowBlur = 0;
                ctx.closePath();

                const def = UNIT_DEFS[entity.type] || {};
                const maxHp = def.max_hp || def.hp || 100;
                const hpPercent = entity.hp / maxHp;

                if (hpPercent < 1.0 || entity.type !== 'mineral_patch') {
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(x - 10, y - radius - 8, 20, 4);
                    const barColor = hpPercent > 0.5 ? '#22c55e' : (hpPercent > 0.2 ? '#eab308' : '#ef4444');
                    ctx.fillStyle = barColor;
                    ctx.fillRect(x - 10, y - radius - 8, 20 * hpPercent, 4);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = `${10 / camera.scale}px Inter`;
                ctx.textAlign = 'center';

                if (entity.type === 'base') {
                    ctx.fillText(entity.hp.toFixed(0), x, y + 25);
                } else if (entity.type === 'mineral_patch') {
                    ctx.fillText(entity.hp.toFixed(0), x, y + 20);
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${8 / camera.scale}px Inter`;
                    ctx.fillText(entity.type[0].toUpperCase(), x, y + 3);
                }
            });
            ctx.restore();
        }

        function animate(timestamp) {
            if (isPlaying && replayData) {
                const elapsed = timestamp - lastFrameTime;
                const nextFrameDelay = 100 / playbackSpeed;
                if (elapsed > nextFrameDelay) {
                    if (currentTick < MAX_TICKS) {
                        currentTick++;
                        while (nextDeltaIndex < replayData.length && replayData[nextDeltaIndex].tick <= currentTick) {
                            applyDelta(replayData[nextDeltaIndex]);
                            nextDeltaIndex++;
                        }
                        draw();
                    } else {
                        isPlaying = false;
                        playPauseBtn.textContent = 'Play';
                    }
                    lastFrameTime = timestamp;
                }
            }
            requestAnimationFrame(animate);
        }

        playPauseBtn.onclick = () => {
            if (!replayData) return;
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
            if (isPlaying && currentTick >= MAX_TICKS) {
                currentTick = 0;
                initInitialState();
                nextDeltaIndex = 1;
            }
            lastFrameTime = performance.now();
        };

        resetBtn.onclick = () => {
            currentTick = 0;
            isPlaying = false;
            playPauseBtn.textContent = 'Play';
            initInitialState();
            monitoredEntityId = null;
            logHeader.textContent = 'SELECT ENTITY';
            logContent.innerHTML = '<div style="color: #64748b; font-style: italic;">Run a scenario and click a unit to view its logs.</div>';
            nextDeltaIndex = 1;
            draw();
        };

        progressCtrl.oninput = () => jumpToTick(parseInt(progressCtrl.value));
        speedCtrl.onchange = () => playbackSpeed = parseFloat(speedCtrl.value);

        draw();
        requestAnimationFrame(animate);
    </script>
</body>

</html>
